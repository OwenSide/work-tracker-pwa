<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Иконка вкладки (по умолчанию Vite, потом можешь положить свою в папку public) -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Идеальный Viewport для PWA: отключает зум, подстраивается под вырезы (челку) экрана -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>WorkTracker</title> 

    <!-- Настройки PWA для Android и iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Цвет верхней панели браузера (под цвет нашего фона) -->
    <meta name="theme-color" content="#0a0a0c">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
